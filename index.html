<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>HelpDesk Notes</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>📞 Sistema de Chamados</h1>

    <form id="ticketForm">
      <input type="text" id="titulo" placeholder="Título do chamado" required>
      <textarea id="descricao" placeholder="Descrição"></textarea>
      <button type="submit">Abrir Chamado</button>
    </form>

    <!-- 🔥 ABAS -->
    <div class="tabs">
      <button onclick="filtrar('recentes')">Recentes</button>
      <button onclick="filtrar('abertos')">Abertos</button>
      <button onclick="filtrar('fechados')">Fechados</button>
    </div>

    <h2>Chamados</h2>

    <ul id="listaChamados"></ul>

  </div>

  <script src="script.js"></script>
</body>
</html>
